openapi: 3.1.0
info:
  title: Data Moat Engine — Static JSON API
  version: "1.0.0"
  description: >
    A zero-infrastructure "static API": every endpoint is a prebuilt JSON file served from a CDN,
    regenerated by the refresh pipeline. There is no server and no runtime cost. Every value carries
    provenance — effective_date, source_url, retrieved_at, confidence — so agents can trust and cite it.
    (The dataset title, metrics, and examples below are finalized once the niche is selected; see
    /api/v1/meta.json for the live values.)
  license:
    name: See attribution in meta.json
    url: https://example.org/about
servers:
  - url: https://<<OWNER_DOMAIN>>
    description: Production CDN (owner sets the domain at deploy time)
paths:
  /api/v1/index.json:
    get:
      operationId: getServiceIndex
      summary: Service index — links to every endpoint + counts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version: { type: string }
                  dataset: { type: string }
                  generated_at: { type: string, format: date-time }
                  endpoints: { type: object }
                  counts: { type: object }
  /api/v1/meta.json:
    get:
      operationId: getMeta
      summary: Dataset metadata, freshness, and official sources
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/metrics.json:
    get:
      operationId: getMetrics
      summary: List of metric names present in the dataset
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/entities.json:
    get:
      operationId: getEntities
      summary: Collection index — all entities with their latest value per metric
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/latest.json:
    get:
      operationId: getLatest
      summary: Flat list of every entity's current value — the one-call integration
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
  /api/v1/entity/{slug}.json:
    get:
      operationId: getEntity
      summary: One entity — latest values + full history, each with provenance
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
          description: URL-safe entity slug (see entities.json for the list).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "404":
          description: No such entity (the file does not exist on the CDN)
  /api/v1/entity/{slug}.csv:
    get:
      operationId: getEntityCsv
      summary: One entity's full history as CSV (spreadsheet-ready, provenance columns included)
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            text/csv:
              schema: { type: string }
        "404":
          description: No such entity
components:
  schemas:
    Observation:
      type: object
      description: A single value with full provenance.
      required: [metric, unit, effective_date, source_url, retrieved_at, confidence]
      properties:
        metric: { type: string, description: "e.g. the primary metric name" }
        value: { type: [number, "null"], description: "machine-usable numeric value" }
        value_text: { type: [string, "null"], description: "human display / ranges" }
        unit: { type: string }
        effective_date: { type: string, format: date, description: "date the value took effect" }
        source_id: { type: string }
        source_url: { type: string, format: uri, description: "exact page the value came from" }
        retrieved_at: { type: string, format: date-time }
        confidence: { type: string, enum: [high, medium, low] }
        method: { type: [string, "null"] }
        notes: { type: [string, "null"] }
    Entity:
      type: object
      required: [slug, name, entity_type]
      properties:
        slug: { type: string }
        name: { type: string }
        entity_type: { type: string }
        jurisdiction: { type: [string, "null"] }
        region: { type: [string, "null"] }
        locale: { type: [string, "null"] }
        metrics: { type: array, items: { type: string } }
        latest:
          type: object
          additionalProperties: { $ref: "#/components/schemas/Observation" }
        history:
          type: object
          additionalProperties:
            type: array
            items: { $ref: "#/components/schemas/Observation" }
    Envelope:
      type: object
      required: [api_version, generated_at, data]
      properties:
        api_version: { type: string }
        generated_at: { type: string, format: date-time }
        attribution: { type: [string, "null"] }
        license: { type: [string, "null"] }
        data: {}
