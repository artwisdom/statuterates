# ============================================================================================
# INACTIVE until this repo is pushed to GitHub by the owner AND GitHub Pages is enabled
# (Settings → Pages → Source: GitHub Actions). See docs/DEPLOYMENT_GUIDE.md.
#
# Estimated usage: runs on data/site changes (≈ weekly) × ~2 min = ~9 min/month. Free tier: 2,000.
# ============================================================================================
name: deploy-site

on:
  push:
    branches: [main]
    paths:
      - "data/exports/**"
      - "site/**"
      - "machine/build-api.mjs"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install site dependencies
        working-directory: site
        run: npm ci || npm install

      - name: Build the static JSON API from the committed exports
        # Regenerate site/public/api/ (git-ignored) from data/exports before building the site.
        run: node machine/build-api.mjs

      - name: Build the site
        working-directory: site
        env:
          # The owner sets their real domain here (repository variable). Falls back to the Pages URL.
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          # One-switch ads: set repo variable ADSENSE_CLIENT=ca-pub-XXXX after AdSense approval.
          ADSENSE_CLIENT: ${{ vars.ADSENSE_CLIENT || '' }}
          # Optional: set ADSENSE_SLOT to a "Display/responsive" ad-unit id to render intentional,
          # labeled in-content ad units (top/bottom of each page). Empty = rely on Auto Ads only.
          ADSENSE_SLOT: ${{ vars.ADSENSE_SLOT || '' }}
          # Optional: set CF_ANALYTICS_TOKEN to your Cloudflare Web Analytics site token to ship the
          # cookieless beacon. Empty = no analytics beacon ships.
          CF_ANALYTICS_TOKEN: ${{ vars.CF_ANALYTICS_TOKEN || '' }}
        run: npm run build

      - name: Apply base path for GitHub Pages project subpath
        working-directory: site
        # No-op at a domain root. For a project site (github.io/<repo>) it rewrites internal links to
        # the /<repo>/ subpath. If a custom domain is set (vars.SITE_URL), BASE_PATH defaults to '/'.
        env:
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io', github.repository_owner) }}
          BASE_PATH: ${{ vars.BASE_PATH || (vars.SITE_URL && '/' || format('/{0}', github.event.repository.name)) }}
        run: node scripts/fix-base.mjs

      - name: Verify API conformance (fail the deploy if the API drifted)
        run: node machine/check-api-conformance.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      # Notify IndexNow (Bing, Yandex, DuckDuckGo, ChatGPT-search — Google does NOT use IndexNow) of the
      # site's URLs so changed rate pages get recrawled fast. Non-fatal: a ping failure never blocks a
      # deploy. Only runs for the real domain. The key is a public file at /<key>.txt (site/public/).
      - name: Ping IndexNow
        if: ${{ vars.SITE_URL != '' }}
        continue-on-error: true
        run: |
          KEY=78e1a4c8dd592144913ffc2f8f1b9478
          HOST=$(printf '%s' "${{ vars.SITE_URL }}" | sed -E 's#https?://##; s#/.*$##')
          if [ ! -f site/dist/sitemap.xml ]; then echo "no sitemap.xml; skipping IndexNow"; exit 0; fi
          grep -oE '<loc>[^<]+</loc>' site/dist/sitemap.xml | sed -E 's#</?loc>##g' | head -10000 \
            | jq -R . | jq -s "{host: \"$HOST\", key: \"$KEY\", keyLocation: \"https://$HOST/$KEY.txt\", urlList: .}" > indexnow.json
          echo "Submitting $(jq '.urlList | length' indexnow.json) URLs to IndexNow for $HOST"
          curl -sS -X POST "https://api.indexnow.org/indexnow" \
            -H 'Content-Type: application/json; charset=utf-8' \
            --data @indexnow.json -w "IndexNow HTTP %{http_code}\n" -o /dev/null \
            || echo "IndexNow ping failed (non-fatal)"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

# --------------------------------------------------------------------------------------------
# ALTERNATIVE: Cloudflare Pages (better for pay-per-crawl + edge performance). To use instead of
# GitHub Pages, disable the `deploy` job above and use Cloudflare's Git integration, or:
#
#   - name: Publish to Cloudflare Pages
#     uses: cloudflare/pages-action@v1
#     with:
#       apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}   # owner adds this secret
#       accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }} # owner adds this secret
#       projectName: statuterates
#       directory: site/dist
# --------------------------------------------------------------------------------------------
